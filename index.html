<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Tải Game - Cunken</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .card {
            background: #ffffff;
            width: 320px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .file-icon {
            width: 100px;
            height: 100px;
            background: #f0f0f0;
            border-radius: 20px;
            margin-bottom: 20px;
            object-fit: cover;
            border: 3px solid #eee;
        }

        h2 {
            color: #333;
            margin: 10px 0;
            font-size: 24px;
        }

        p {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-download {
            display: block;
            background-color: #ff4757;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-download:hover {
            background-color: #ff6b81;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        .footer-text {
            margin-top: 15px;
            font-size: 11px;
            color: #bbb;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3408/3408455.png" alt="Game Icon" class="file-icon">
        
        <h2>The Battle Stickman</h2>
        <p>Phiên bản: <b>1.0.0</b><br>
           Nhà phát triển: <b>Cunken</b></p>

        <button class="btn-download" onclick="thongBao()">
            TẢI XUỐNG NGAY
        </button>

        <p class="footer-text">Trang web được tạo bởi Cunken</p>
    </div>

    <script>
        function thongBao() {
            alert("⚠️ Thông báo: Game hiện đang trong quá trình bảo trì hoặc đang phát triển. Vui lòng quay lại sau nhé!");
        }
    </script>

</body>
</html>
