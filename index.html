<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Tải Game Của Cunken</title>
    <style>
        /* Phần này là CSS để làm đẹp */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            width: 320px;
            padding: 20px;
            border-radius: 20px; /* Bo góc tròn xịn */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); /* Đổ bóng cho nổi lên */
            text-align: center;
            border: 2px solid #ddd;
        }

        .icon-game {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2 {
            margin: 10px 0;
            color: #333;
            font-size: 22px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn-download {
            display: block;
            background-color: #007bff; /* Màu xanh dương */
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-download:hover {
            background-color: #0056b3; /* Đổi màu khi di chuột vào */
            transform: scale(1.05); /* Phóng to nhẹ khi di chuột */
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/100" alt="Icon Game" class="icon-game">
        
        <h2>Battle Stickman</h2>
        <p>Phiên bản: 1.0.0 (APK)<br>Dung lượng: 25MB</p>

        <a href="#" download class="btn-download">TẢI XUỐNG NGAY</a>
    </div>

</body>
</html>
