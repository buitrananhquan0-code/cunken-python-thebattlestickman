<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Tải Game - Cunken</title>
    <style>
        /* --- GIỮ NGUYÊN CSS CŨ CỦA BẠN --- */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0c29; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(135deg, rgba(15, 12, 41, 0.8), rgba(36, 36, 62, 0.8)), 
                              url('map.png');
            background-size: cover;
            background-position: center;
            opacity: 0.7; 
            z-index: -1;
        }

        .card {
            background: rgba(255, 255, 255, 0.9); 
            width: 350px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        .file-icon { width: 140px; height: 140px; object-fit: contain; margin-bottom: 25px; }
        h2 { color: #1e1e2f; margin: 15px 0 5px; font-size: 28px; font-weight: 800; text-transform: uppercase; }
        .version-info { color: #555; font-size: 15px; margin-bottom: 30px; background: #f0f2f5; padding: 8px; border-radius: 10px; display: inline-block; }
        .btn-download { display: block; background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; text-decoration: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; border: none; width: 100%; }
        .footer-text { margin-top: 25px; font-size: 12px; color: #888; }
        b { color: #ff4757; }

        /* --- THÊM MỚI: NÚT THÔNG TIN GÓC DƯỚI PHẢI --- */
        .info-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: 0.3s;
            z-index: 100;
        }

        .info-trigger:hover {
            transform: scale(1.1) rotate(10deg);
            background: #ff6b81;
        }

        /* --- PHẦN MODAL (BẢNG HIỆN LÊN) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none; /* Ẩn mặc định */
            justify-content: center;
            align-items: center;
            z-index: 1001;
            backdrop-filter: blur(5px);
        }

        .modal-box {
            background: white;
            color: #333;
            width: 85%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            position: relative;
            text-align: left; /* Để thông tin dễ đọc hơn */
            animation: popUp 0.3s ease-out;
        }

        @keyframes popUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #aaa;
            cursor: pointer;
        }

        .close-btn:hover { color: #ff4757; }

        .modal-box h3 { color: #1e1e2f; margin-top: 0; border-bottom: 2px solid #ff4757; padding-bottom: 10px; }
        .info-item { margin: 15px 0; font-size: 15px; color: #444; }
        .info-item strong { color: #ff4757; }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo the battle stickman.svg" alt="Logo" class="file-icon">
        <h2>The Battle Stickman</h2>
        <div class="version-info">
            Phiên bản: <b>0</b> | Dev: <b>Cunken</b>
        </div>
        <button class="btn-download" onclick="alert('Đang chuẩn bị file tải...')">
            TẢI XUỐNG NGAY
        </button>
        <p class="footer-text">© 2026 Designed by Cunken</p>
    </div>
